apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: mongo
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      securityContext:
        fsGroup: 999

      initContainers:
        - name: fix-permissions
          image: busybox
          command:
            - sh
            - -c
            - |
              cp /secret/keyfile /workdir/keyfile && \
              chmod 600 /workdir/keyfile
          volumeMounts:
            - name: mongo-keyfile
              mountPath: /secret
            - name: mongo-keyfile-tmp
              mountPath: /workdir

      containers:
        - name: mongo
          image: mongo:7
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
            - "--auth"
            - "--keyFile"
            - "/etc/mongo-keyfile/keyfile"
          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: username

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: password

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

            - name: mongo-keyfile-tmp
              mountPath: /etc/mongo-keyfile

      volumes:
        - name: mongo-keyfile
          secret:
            secretName: mongo-keyfile-secret

        - name: mongo-keyfile-tmp
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi