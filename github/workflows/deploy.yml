name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_API: your-dockerhub-username/mts-api
  IMAGE_FRONTEND: your-dockerhub-username/mts-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to DockerHub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build API image
      - name: Build API
        run: |
          docker build -t $IMAGE_API:latest ./backend

      # 4. Build Frontend image
      - name: Build Frontend
        run: |
          docker build -t $IMAGE_FRONTEND:latest ./frontend

      # 5. Push images
      - name: Push Images
        run: |
          docker push $IMAGE_API:latest
          docker push $IMAGE_FRONTEND:latest

      # 6. Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 7. Setup kubeconfig
      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      # 8. Deploy via Helm
      - name: Deploy with Helm
        run: |
          helm upgrade --install mts ./helm/mts